      margin: 0;

      color: #1f2937;

      color: white;

      padding: 12px 18px;

    }

    .botao-voltar:hover {
      opacity: 0.9;

      padding: 12px 18px;

      font-size: 14px;

    .botao-principal:hover {
      opacity: 0.9;

      margin-bottom: 15px;
    }

    .estado-vazio p {
      color: #6b7280;
      margin: 10px 0 20px;
    }

    .formulario {
      background: white;
      border-radius: 14px;
      padding: 25px;
      margin-top: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

      margin-bottom: 20px;
    }
